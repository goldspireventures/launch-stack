name: Studio ops alerts

on:
  schedule:
    # Every 6 hours UTC — fallback when Inngest is not configured (Console /api/inngest)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  alerts:
    name: Runbook + enquiry SLA scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Runbook blocker scan
        run: pnpm studio:runbook-alerts
      - name: Stale enquiry digest
        run: pnpm studio:stale-enquiry-alerts
      - name: Lab portfolio (health + integrations + alerts)
        run: pnpm studio:lab-cron
